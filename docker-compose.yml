version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: finsight-backend:1.0.0
    container_name: finsight-backend
    restart: unless-stopped
    environment:
      # Defaults to PostgreSQL (the postgres service below). Override in .env.
      DATABASE_URL: ${DATABASE_URL:-postgresql://finsight:${POSTGRES_PASSWORD:-finsight}@postgres:5432/finsight}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?set ADMIN_API_KEY in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MODEL_PATH: /app/models/trained
      LOG_LEVEL: INFO
      ENVIRONMENT: production
      DEBUG: "False"
      TF_CPP_MIN_LOG_LEVEL: "3"
    volumes:
      - finsight-data:/app/data
      - finsight-models:/app/models
      - finsight-logs:/app/logs
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    image: finsight-frontend:1.0.0
    container_name: finsight-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL (production database) ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finsight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - finsight-pgdata:/var/lib/postgresql/data
    # Not published to the host — only reachable on the internal compose network.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsight -d finsight"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (caching) ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finsight-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - finsight-redis:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx reverse proxy (TLS termination) ─────────────────────────────────
  # Terminates TLS and routes: /api + /ws → backend, everything else → frontend.
  # Put your certs in ./nginx/certs (fullchain.pem + privkey.pem).
  nginx:
    image: nginx:1.27-alpine
    container_name: finsight-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  finsight-data:    # SQLite fallback / app data
  finsight-models:  # Trained .keras + .pkl
  finsight-logs:
  finsight-pgdata:  # PostgreSQL data
  finsight-redis:   # Redis persistence
